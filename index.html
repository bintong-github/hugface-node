<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保护环境 - 业态剥离视觉体验</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #0d1117;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 背景微光特效 */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(46, 213, 115, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* 核心画布容器 */
        .container {
            position: relative;
            width: 800px;
            height: 500px;
            perspective: 1000px; /* 开启3D透视 */
            z-index: 2;
        }

        /* 剥离效果主体 */
        .split-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 共有层样式 */
        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            backface-visibility: hidden;
        }

        /* --- 底层：工业破坏/现状 (Base Layer) --- */
        .layer-base {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?auto=format&fit=crop&w=1200&q=80') center/cover;
            border: 1px solid rgba(255, 71, 87, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transform: translateZ(0px);
        }

        .layer-base h2 {
            font-size: 2.5rem;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }

        .layer-base p {
            font-size: 1.1rem;
            color: #a4b0be;
            max-width: 500px;
            text-align: center;
            line-height: 1.8;
        }

        /* --- 表层：绿色生态/愿景 (Stripping Layer) --- */
        /* 使用 clip-path 将表层分为左右两部分，实现向两侧“剥离”的错觉 */
        .layer-peel-left, .layer-peel-right {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1200&q=80') center/cover;
            border: 1px solid rgba(46, 213, 115, 0.4);
            filter: drop-shadow(0 0 20px rgba(46, 213, 115, 0.2));
        }

        /* 左半部分表层 */
        .layer-peel-left {
            clip-path: inset(0 50% 0 0);
            transform: translateZ(30px); /* 悬浮在底层之上 */
        }

        /* 右半部分表层 */
        .layer-peel-right {
            clip-path: inset(0 0 0 50%);
            transform: translateZ(30px);
        }

        /* 表层文字内容布局（居中重合） */
        .peel-content {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            top: 0;
            left: 0;
            transition: opacity 0.4s ease;
        }

        .peel-content h1 {
            font-size: 3.5rem;
            color: #2ed573;
            letter-spacing: 6px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(46, 213, 115, 0.6);
        }

        .peel-content p {
            font-size: 1.2rem;
            color: #ffffff;
            border: 2px solid #2ed573;
            padding: 8px 24px;
            border-radius: 30px;
            background: rgba(46, 213, 115, 0.1);
            backdrop-filter: blur(5px);
        }

        /* --- 触发交互动画 (Hover Effects) --- */
        /* 鼠标悬停时：整体轻微旋转增强3D感 */
        .container:hover .split-card {
            transform: rotateX(10deg) rotateY(-5deg);
        }

        /* 鼠标悬停时：左侧表层向左外上方剥离，并产生角度倾斜 */
        .container:hover .layer-peel-left {
            transform: translate3d(-30%, -5%, 80px) rotateY(-15deg);
            opacity: 0.15;
            filter: grayscale(80%) blur(2px);
        }

        /* 鼠标悬停时：右侧表层向右外下方剥离，并产生角度倾斜 */
        .container:hover .layer-peel-right {
            transform: translate3d(30%, 5%, 80px) rotateY(15deg);
            opacity: 0.15;
            filter: grayscale(80%) blur(2px);
        }

        /* 提示标签 */
        .hint {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: #747d8c;
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="split-card">
            
            <div class="layer layer-base">
                <h2>生态剥离的代价</h2>
                <p>当绿色被工业喧嚣与污染无情剥离，留给地球的只剩下满目疮痍。保护环境，不是口号，而是挽救我们共存的根基。</p>
            </div>

            <div class="layer layer-peel-left">
                <div class="peel-content">
                    <h1>守护绿水青山</h1>
                    <p>触碰探索自然本源</p>
                </div>
            </div>

            <div class="layer layer-peel-right">
                <div class="peel-content">
                    <h1>守护绿水青山</h1>
                    <p>触碰探索自然本源</p>
                </div>
            </div>

        </div>

        <div class="hint">【 将鼠标悬停在卡片上感受业态剥离 】</div>
    </div>

</body>
</html>
